name: Build and Deploy to Hostinger

on:
  push:
    branches:
      - main  # Se ejecuta automáticamente cada vez que hagas push a la rama 'main'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código del repositorio
      - name: 📂 Checkout code
        uses: actions/checkout@v4

      # 2. Configurar la versión de Node.js en los servidores de GitHub
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Instalar las librerías del proyecto
      - name: 📥 Install dependencies
        run: npm ci || npm install

      # 4. Compilar el sitio web (crea la carpeta /dist)
      - name: 🏗️ Build project
        run: npm run build

      # 5. Conectarse a Hostinger por FTP y subir los archivos de /dist
      - name: 🚀 Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /public_html/
          port: 21
          protocol: ftp
          security: loose
          timeout: 180000
          state-name: .ftp-deploy-sync-state.json # Archivo de control para subir solo los archivos modificados
